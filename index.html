<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c6ff,#00ff88);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
    animation:float 8s ease-in-out infinite;
}

.circle1{
    width:200px;
    height:200px;
    top:10%;
    left:10%;
}

.circle2{
    width:250px;
    height:250px;
    bottom:10%;
    right:10%;
    animation-delay:2s;
}

@keyframes float{
    50%{
        transform:translateY(-30px);
    }
}

.container{
    width:430px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

h1{
    margin-bottom:10px;
    font-size:32px;
}

.subtitle{
    margin-bottom:25px;
    opacity:0.9;
}

.input-group{
    margin:18px 0;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:16px;
    transition:0.3s;
}

input::placeholder{
    color:#f0f0f0;
}

input:focus{
    background:rgba(255,255,255,0.3);
    transform:scale(1.03);
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:white;
    color:#2575fc;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 0 25px rgba(255,255,255,0.9);
}

.success-message{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:rgba(0,255,120,0.2);
    border:1px solid rgba(255,255,255,0.4);
    color:white;
    font-weight:bold;
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.8;
}

</style>
</head>
<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container">

    <h1>✨ User Registration</h1>
    <p class="subtitle">Store user details securely in MySQL</p>

    <form action="/submit" method="POST">

        <div class="input-group">
            <input
                type="text"
                name="name"
                placeholder="👤 Enter Your Name"
                required>
        </div>

        <div class="input-group">
            <input
                type="email"
                name="email"
                placeholder="📧 Enter Your Email"
                required>
        </div>

        <button type="submit">
            🚀 Submit Data
        </button>

    </form>

    {% if success_message %}
    <div class="success-message">
        {{ success_message }}
    </div>
    {% endif %}

    <div class="footer">
        SQL + Flask User Management Project
    </div>

</div>

</body>
</html>
